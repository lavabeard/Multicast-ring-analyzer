name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── Linux build + smoke test ─────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Electron build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-dev libgtk-3-dev libnss3 libatk1.0-0 \
            libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libasound2 libpango-1.0-0 libcairo2 \
            ffmpeg
      - run: npm ci
      - run: npm run dist:linux
      - name: Smoke test artifacts
        run: |
          APPIMAGE=$(ls dist/*.AppImage | head -1)
          DEB=$(ls dist/*.deb | head -1)
          echo "AppImage: $APPIMAGE"
          echo "deb:      $DEB"
          file "$APPIMAGE"
          dpkg-deb --info "$DEB"
          ffprobe -version | head -1
          echo "Smoke tests passed."
      - uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          path: |
            dist/*.AppImage
            dist/*.deb

  # ── Release (tag pushes only) ────────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-dist
          path: dist-artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: dist-artifacts/**
